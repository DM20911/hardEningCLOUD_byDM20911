<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
  <rect width="1000" height="440" fill="#0f1626"/>
  <text x="40" y="44" fill="#cfe0ff" font-size="24" font-weight="700">Benchmark — pass rate de aserciones (iteration-1)</text>
  <text x="40" y="70" fill="#7f93b4" font-size="15">Con skill vs. baseline (sin skill) · 3 casos · 14 aserciones totales</text>
  <!-- axes -->
  <line x1="120" y1="100" x2="120" y2="360" stroke="#33425f"/>
  <line x1="120" y1="360" x2="940" y2="360" stroke="#33425f"/>
  <g fill="#6f83a6" font-size="13" text-anchor="end">
    <text x="110" y="365">0%</text><text x="110" y="295">25%</text><text x="110" y="230">50%</text><text x="110" y="165">75%</text><text x="110" y="105">100%</text>
  </g>
  <g stroke="#1d2c4d"><line x1="120" y1="295" x2="940" y2="295"/><line x1="120" y1="230" x2="940" y2="230"/><line x1="120" y1="165" x2="940" y2="165"/><line x1="120" y1="100" x2="940" y2="100"/></g>
  <!-- groups: each case has two bars. scale 260px = 100% -->
  <!-- GCP: with 100, base 60 -->
  <g>
    <rect x="170" y="100" width="70" height="260" rx="6" fill="#38e8c6"/><text x="205" y="92" fill="#38e8c6" font-size="14" text-anchor="middle" font-weight="700">100%</text>
    <rect x="250" y="204" width="70" height="156" rx="6" fill="#5b8cff" opacity="0.7"/><text x="285" y="196" fill="#9fb3d6" font-size="14" text-anchor="middle">60%</text>
    <text x="245" y="384" fill="#cfe0ff" font-size="14" text-anchor="middle">GCP audit</text>
  </g>
  <!-- AWS: with 100, base 80 -->
  <g>
    <rect x="450" y="100" width="70" height="260" rx="6" fill="#38e8c6"/><text x="485" y="92" fill="#38e8c6" font-size="14" text-anchor="middle" font-weight="700">100%</text>
    <rect x="530" y="152" width="70" height="208" rx="6" fill="#5b8cff" opacity="0.7"/><text x="565" y="144" fill="#9fb3d6" font-size="14" text-anchor="middle">80%</text>
    <text x="525" y="384" fill="#cfe0ff" font-size="14" text-anchor="middle">AWS IAM</text>
  </g>
  <!-- Azure: with 100, base 100 -->
  <g>
    <rect x="730" y="100" width="70" height="260" rx="6" fill="#38e8c6"/><text x="765" y="92" fill="#38e8c6" font-size="14" text-anchor="middle" font-weight="700">100%</text>
    <rect x="810" y="100" width="70" height="260" rx="6" fill="#5b8cff" opacity="0.7"/><text x="845" y="92" fill="#9fb3d6" font-size="14" text-anchor="middle">100%</text>
    <text x="805" y="384" fill="#cfe0ff" font-size="14" text-anchor="middle">Azure read-only</text>
  </g>
  <!-- legend -->
  <g font-size="14"><rect x="600" y="410" width="16" height="16" rx="3" fill="#38e8c6"/><text x="624" y="423" fill="#cfe0ff">con skill</text>
  <rect x="720" y="410" width="16" height="16" rx="3" fill="#5b8cff" opacity="0.7"/><text x="744" y="423" fill="#cfe0ff">baseline</text></g>
  <text x="40" y="423" fill="#38e8c6" font-size="16" font-weight="700">Total: 100% vs 79%  (+21 pts)</text>
</svg>
